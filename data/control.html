<!DOCTYPE html>
<html lang="en">
<head>
    <title>Access Controller</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <button class="icon-btn" onclick="toggleDarkMode()" title="Toggle dark mode">
                <svg id="sunIcon" class="hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
                </svg>
                <svg id="moonIcon" class="block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
                </svg>
            </button>
            <h1>Access Controller</h1>
            <button class="icon-btn" onclick="window.location.href='/settings.html'" title="Settings">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                </svg>
            </button>
        </div>

        <!-- Control Section -->
        <div class="card">
            <h2>
                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                </svg>
                Control
            </h2>
            <div class="center">
                <button id="unlockBtn" class="btn btn-blue btn-half" onclick="sendCommand(1)">
                    <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="display:inline;vertical-align:middle;margin-right:8px;">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 11V7a4 4 0 118 0m-4 8v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2z"/>
                    </svg>
                    Unlock
                </button>
                <button id="lockBtn" class="btn btn-gray btn-half" onclick="sendCommand(2)">
                    <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="display:inline;vertical-align:middle;margin-right:8px;">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                    </svg>
                    Lock
                </button>
            </div>
            <p id="status" class="status-text center" style="height:1.5rem;"></p>
        </div>

        <!-- Configuration Section -->
        <div class="card">
            <h2>
                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                </svg>
                Configuration
            </h2>
            <button class="btn btn-purple" onclick="window.location.href='/macros.html'">Relay Macros</button>
        </div>
    </div>

    <!-- Pairing lost modal -->
    <div id="modal-overlay" class="modal-overlay">
        <div class="modal">
            <div class="modal-icon">&#128279;</div>
            <h3>Device No Longer Paired</h3>
            <p>This device is no longer recognised by the controller.</p>
            <p id="pairStatus" class="status-text center" style="display:none;"></p>
            <div class="modal-btns" id="modalBtns">
                <button class="btn btn-gray" onclick="closeModal()">Later</button>
                <button class="btn btn-green" onclick="pairNow()">Pair Now</button>
            </div>
        </div>
    </div>

    <script>
        let modalShowing = false;

        function toggleDarkMode() {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('darkMode', document.documentElement.classList.contains('dark'));
        }
        if (localStorage.getItem('darkMode') === 'true' || 
            (!localStorage.getItem('darkMode') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }

        function getStoredPairing() {
            const id    = localStorage.getItem('device_id');
            const token = localStorage.getItem('device_token');
            return (id && token) ? { id, token } : null;
        }

        function storePairing(deviceId, token) {
            localStorage.setItem('device_id', deviceId);
            localStorage.setItem('device_token', token);
        }

        function generateUUID() {
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
                const r = Math.random() * 16 | 0;
                return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
            });
        }

        function showPairingLostModal() {
            if (modalShowing) return;
            modalShowing = true;
            document.getElementById('pairStatus').style.display = 'none';
            document.getElementById('modalBtns').style.display = 'flex';
            document.getElementById('modal-overlay').classList.add('active');
        }

        function closeModal() {
            modalShowing = false;
            document.getElementById('modal-overlay').classList.remove('active');
        }

        async function pairNow() {
            document.getElementById('pairStatus').style.display = 'block';
            document.getElementById('pairStatus').innerText = 'Pairing...';
            document.getElementById('modalBtns').style.display = 'none';

            const deviceId = generateUUID();

            try {
                const resp = await fetch('/pair', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ device_id: deviceId })
                });

                const data = await resp.json();

                if (data.ok && data.token) {
                    storePairing(deviceId, data.token);
                    document.getElementById('pairStatus').innerText = 'Paired!';
                    setTimeout(closeModal, 1000);
                } else {
                    document.getElementById('pairStatus').innerText = `Failed: ${data.error || 'Unknown error'}`;
                    document.getElementById('modalBtns').style.display = 'flex';
                }
            } catch (e) {
                document.getElementById('pairStatus').innerText = 'Failed - is pairing window open?';
                document.getElementById('modalBtns').style.display = 'flex';
            }
        }

        async function sendCommand(command) {
            const pairing = getStoredPairing();
            if (!pairing) {
                showPairingLostModal();
                return;
            }

            const statusEl = document.getElementById('status');

            try {
                const resp = await fetch('/cmd', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        device_id: pairing.id,
                        token:     pairing.token,
                        command:   command
                    })
                });

                const data = await resp.json();

                if (resp.status === 401 || (data.error && 
                    (data.error === 'Unauthorized' || data.error === 'Unknown device'))) {
                    showPairingLostModal();
                    return;
                }

                statusEl.innerText = data.ok ? `Status: ${data.status}` : `Error: ${data.error}`;

            } catch(e) {
                statusEl.innerText = 'Command failed';
            }
        }

        async function verifyPairing() {
            const pairing = getStoredPairing();
            if (!pairing) return;

            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 3000);

                const resp = await fetch('/cmd', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        device_id: pairing.id,
                        token: pairing.token,
                        command: 0
                    }),
                    signal: controller.signal
                });

                clearTimeout(timeoutId);

                if (resp.status === 401 || resp.status === 403) {
                    localStorage.removeItem('device_id');
                    localStorage.removeItem('device_token');
                    window.location.href = '/settings.html';
                }
            } catch(e) {
                // Network error or timeout, ignore
            }
        }

        setTimeout(verifyPairing, 500);
    </script>
</body>
</html>
