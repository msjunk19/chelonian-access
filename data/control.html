<!DOCTYPE html>
<html>
<head>
    <title>Access Controller</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 50px;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }

        h2 {
            color: #555;
            font-size: 16px;
            margin-top: 30px;
            border-top: 1px solid #ddd;
            padding-top: 20px;
        }

        button {
            font-size: 20px;
            padding: 15px 30px;
            margin: 10px;
            width: 80%;
            cursor: pointer;
        }

        #pairBtn {
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
        }

        #pairBtn:disabled {
            background-color: #aaa;
            cursor: not-allowed;
        }

        #unpairBtn {
            background-color: #e74c3c;
            color: white;
            border: none;
            border-radius: 8px;
            display: none; /* hidden until paired */
        }

        #status {
            margin-top: 20px;
            font-size: 16px;
            color: #333;
        }

        #pairStatus {
            margin-top: 10px;
            font-size: 14px;
            color: #666;
        }
    </style>
</head>
<body>

    <h1>Access Controller</h1>

    <!-- Existing functionality -->
    <h2>Card Simulation</h2>
    <button onclick="simulateAccess()">Simulate Valid Card</button>
    <p id="status">Status: Idle</p>

    <!-- Pairing section -->
    <h2>Phone Pairing</h2>
    <p id="pairStatus">Checking pairing status...</p>
    <button id="pairBtn" onclick="pairDevice()">Pair This Device</button>
    <button id="unpairBtn" onclick="unpairDevice()">Unpair This Device</button>

    <script>
        // -------------------------
        // Existing simulate function
        function simulateAccess() {
            fetch('/api/simulate', { method: 'POST' })
                .then(r => r.text())
                .then(data => {
                    document.getElementById("status").innerText = data;
                })
                .catch(() => {
                    document.getElementById("status").innerText = "Error";
                });
        }

        // -------------------------
        // Pairing helpers

        // Generate a UUID v4
        function generateUUID() {
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
                const r = Math.random() * 16 | 0;
                return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
            });
        }

        // HMAC-SHA256 using Web Crypto API (built into all modern browsers)
        async function computeHMAC(secretHex, deviceId, timestamp, command) {
            const secretBytes = hexToBytes(secretHex);
            const key = await crypto.subtle.importKey(
                "raw", secretBytes,
                { name: "HMAC", hash: "SHA-256" },
                false, ["sign"]
            );

            // Build message: deviceId + timestamp (4 bytes BE) + command
            const idBytes  = new TextEncoder().encode(deviceId);
            const tsBytes  = new Uint8Array(4);
            new DataView(tsBytes.buffer).setUint32(0, timestamp, false); // big-endian
            const cmdBytes = new Uint8Array([command]);

            const message = new Uint8Array([...idBytes, ...tsBytes, ...cmdBytes]);
            const sig     = await crypto.subtle.sign("HMAC", key, message);
            return bytesToHex(new Uint8Array(sig));
        }

        function hexToBytes(hex) {
            const bytes = new Uint8Array(hex.length / 2);
            for (let i = 0; i < hex.length; i += 2)
                bytes[i / 2] = parseInt(hex.substr(i, 2), 16);
            return bytes;
        }

        function bytesToHex(bytes) {
            return Array.from(bytes).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        // -------------------------
        // Storage — localStorage keeps secret on this browser/device
        function getStoredPairing() {
            const id     = localStorage.getItem('device_id');
            const secret = localStorage.getItem('device_secret');
            return (id && secret) ? { id, secret } : null;
        }

        function storePairing(deviceId, secret) {
            localStorage.setItem('device_id', deviceId);
            localStorage.setItem('device_secret', secret);
        }

        function clearPairing() {
            localStorage.removeItem('device_id');
            localStorage.removeItem('device_secret');
        }

        // -------------------------
        // UI state
        function setPairStatus(msg, paired) {
            document.getElementById('pairStatus').innerText = msg;
            document.getElementById('pairBtn').style.display    = paired ? 'none'  : 'inline-block';
            document.getElementById('unpairBtn').style.display  = paired ? 'inline-block' : 'none';
        }

        function checkPairingStatus() {
            const pairing = getStoredPairing();
            if (pairing) {
                setPairStatus(`Paired — device ID: ${pairing.id.substring(0, 8)}...`, true);
            } else {
                setPairStatus('Not paired. Hold pairing button on device (3s), then click Pair.', false);
            }
        }

        // -------------------------
        // Pair this browser/device
        async function pairDevice() {
            const btn = document.getElementById('pairBtn');
            btn.disabled = true;
            setPairStatus('Pairing...', false);

            const deviceId  = generateUUID();
            const timestamp = Math.floor(Date.now() / 1000);

            try {
                const resp = await fetch('/pair', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ device_id: deviceId, timestamp })
                });

                const data = await resp.json();

                if (data.ok && data.secret) {
                    storePairing(deviceId, data.secret);
                    setPairStatus(`Paired — device ID: ${deviceId.substring(0, 8)}...`, true);
                } else {
                    setPairStatus(`Pairing failed: ${data.error || 'Unknown error'}`, false);
                }
            } catch (e) {
                setPairStatus('Pairing failed — is the pairing window open?', false);
            }

            btn.disabled = false;
        }

        // -------------------------
        // Unpair this browser/device
        async function unpairDevice() {
            const pairing = getStoredPairing();
            if (!pairing) { checkPairingStatus(); return; }

            const timestamp = Math.floor(Date.now() / 1000);
            const hmac      = await computeHMAC(
                pairing.secret, pairing.id, timestamp, 0x04 // UNPAIR
            );

            try {
                const resp = await fetch('/unpair', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        device_id: pairing.id,
                        timestamp,
                        hmac
                    })
                });

                const data = await resp.json();
                if (data.ok) {
                    clearPairing();
                    setPairStatus('Unpaired successfully.', false);
                } else {
                    setPairStatus(`Unpair failed: ${data.error || 'Unknown error'}`, false);
                }
            } catch(e) {
                setPairStatus('Unpair request failed.', false);
            }
        }

        // -------------------------
        // Unlock / Lock buttons — signed commands
        async function sendCommand(command) {
            const pairing = getStoredPairing();
            if (!pairing) {
                document.getElementById('status').innerText = 'Not paired!';
                return;
            }

            const timestamp = Math.floor(Date.now() / 1000);
            const hmac      = await computeHMAC(
                pairing.secret, pairing.id, timestamp, command
            );

            try {
                const resp = await fetch('/cmd', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        device_id: pairing.id,
                        timestamp,
                        command,
                        hmac
                    })
                });

                const data = await resp.json();
                document.getElementById('status').innerText =
                    data.ok ? `Status: ${data.status}` : `Error: ${data.error}`;
            } catch(e) {
                document.getElementById('status').innerText = 'Command failed';
            }
        }

        // -------------------------
        // Init
        checkPairingStatus();
    </script>

    <!-- Command buttons — only useful once paired -->
    <h2>Control</h2>
    <button onclick="sendCommand(0x01)">Unlock</button>
    <button onclick="sendCommand(0x02)">Lock</button>

</body>
</html>
