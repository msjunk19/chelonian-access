<!DOCTYPE html>
<html lang="en">
<head>
    <title>Access Controller</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        :root {
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --accent-green: #22c55e;
            --accent-red: #ef4444;
            --accent-purple: #a855f7;
            --bg: #f3f4f6;
            --card-bg: #ffffff;
            --text: #1f2937;
            --text-secondary: #6b7280;
            --border: #e5e7eb;
        }
        html.dark {
            --bg: #111827;
            --card-bg: #1f2937;
            --text: #f9fafb;
            --text-secondary: #9ca3af;
            --border: #374151;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 1rem;
            transition: background 0.2s, color 0.2s;
        }
        .container { max-width: 400px; margin: 0 auto; }
        @media (min-width: 640px) {
            .container { max-width: 500px; }
        }
        @media (min-width: 1024px) {
            .container { max-width: 600px; }
            .card { padding: 2rem; }
            h1 { font-size: 2rem; }
            .btn { padding: 1rem 1.5rem; font-size: 1.125rem; }
            .btn-half { padding: 1.25rem 1.5rem; }
        }
        .card {
            background: var(--card-bg);
            border-radius: 1rem;
            padding: 1.5rem;
            margin-bottom: 1rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: background 0.2s;
        }
        h1 { font-size: 1.5rem; text-align: center; margin-bottom: 0.5rem; color: var(--primary); }
        h2 { font-size: 1rem; color: var(--text); margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; }
        .btn {
            display: block;
            width: 100%;
            padding: 0.875rem 1rem;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 0.75rem;
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
        }
        .btn:active { transform: scale(0.97); }
        .btn-green { background: var(--accent-green); color: white; }
        .btn-green:hover { background: #16a34a; }
        .btn-red { background: var(--accent-red); color: white; }
        .btn-red:hover { background: #dc2626; }
        .btn-blue { background: var(--primary); color: white; }
        .btn-blue:hover { background: var(--primary-hover); }
        .btn-gray { background: var(--text-secondary); color: white; }
        .btn-purple { background: var(--accent-purple); color: white; }
        .btn-purple:hover { background: #9333ea; }
        .btn-half { width: 48%; display: inline-block; margin: 1%; }
        .icon-btn {
            width: 44px;
            height: 44px;
            padding: 0;
            border-radius: 0.75rem;
            background: var(--border);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        .icon-btn:hover { background: #d1d5db; }
        html.dark .icon-btn:hover { background: #4b5563; }
        .icon-btn svg { width: 20px; height: 20px; color: var(--text); }
        .status-text { font-size: 0.875rem; color: var(--text-secondary); margin: 0.75rem 0; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        .header-spacer { width: 44px; }
        .center { text-align: center; }
        
        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 1rem;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: var(--card-bg);
            border-radius: 1.5rem;
            padding: 1.5rem;
            max-width: 320px;
            width: 100%;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .modal-icon { font-size: 3rem; margin-bottom: 1rem; }
        .modal h3 { font-size: 1.25rem; margin-bottom: 0.5rem; }
        .modal p { font-size: 0.875rem; color: var(--text-secondary); margin-bottom: 1.5rem; }
        .modal-btns { display: flex; gap: 0.75rem; }
        .modal-btns .btn { width: auto; flex: 1; padding: 0.75rem; font-size: 0.875rem; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <button class="icon-btn" onclick="window.location.href='/settings.html'" title="Settings">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                </svg>
            </button>
            <h1>Access Controller</h1>
            <button class="icon-btn" onclick="toggleDarkMode()" title="Toggle dark mode">
                <svg id="sunIcon" class="hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
                </svg>
                <svg id="moonIcon" class="block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
                </svg>
            </button>
        </div>

        <!-- Control Section -->
        <div class="card">
            <h2>
                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                </svg>
                Control
            </h2>
            <div class="center">
                <button id="unlockBtn" class="btn btn-blue btn-half" onclick="sendCommand(1)">
                    <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="display:inline;vertical-align:middle;margin-right:8px;">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 11V7a4 4 0 118 0m-4 8v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2z"/>
                    </svg>
                    Unlock
                </button>
                <button id="lockBtn" class="btn btn-gray btn-half" onclick="sendCommand(2)">
                    <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="display:inline;vertical-align:middle;margin-right:8px;">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                    </svg>
                    Lock
                </button>
            </div>
            <p id="status" class="status-text center" style="height:1.5rem;"></p>
        </div>

        <!-- Configuration Section -->
        <div class="card">
            <h2>
                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                </svg>
                Configuration
            </h2>
            <button class="btn btn-purple" onclick="window.location.href='/macros.html'">Relay Macros</button>
        </div>
    </div>

    <!-- Pairing lost modal -->
    <div id="modal-overlay" class="modal-overlay">
        <div class="modal">
            <div class="modal-icon">&#128279;</div>
            <h3>Device No Longer Paired</h3>
            <p>This device is no longer recognised by the controller. This usually happens after a reset or re-flash.</p>
            <div class="modal-btns">
                <button class="btn btn-gray" onclick="closeModal()">Later</button>
                <button class="btn btn-primary" onclick="closeModal(); window.location.href='/settings.html'">Go to Settings</button>
            </div>
        </div>
    </div>

    <script>
        let modalShowing = false;

        function toggleDarkMode() {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('darkMode', document.documentElement.classList.contains('dark'));
        }
        if (localStorage.getItem('darkMode') === 'true' || 
            (!localStorage.getItem('darkMode') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }

        function getStoredPairing() {
            const id    = localStorage.getItem('device_id');
            const token = localStorage.getItem('device_token');
            return (id && token) ? { id, token } : null;
        }

        function showPairingLostModal() {
            if (modalShowing) return;
            modalShowing = true;
            localStorage.removeItem('device_id');
            localStorage.removeItem('device_token');
            document.getElementById('status').innerText = 'Pairing lost - go to Settings to re-pair';
            document.getElementById('modal-overlay').classList.add('active');
        }

        function closeModal() {
            modalShowing = false;
            document.getElementById('modal-overlay').classList.remove('active');
        }

        async function sendCommand(command) {
            const pairing = getStoredPairing();
            if (!pairing) {
                showPairingLostModal();
                return;
            }

            const statusEl = document.getElementById('status');

            try {
                const resp = await fetch('/cmd', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        device_id: pairing.id,
                        token:     pairing.token,
                        command:   command
                    })
                });

                const data = await resp.json();

                if (resp.status === 401 || (data.error && 
                    (data.error === 'Unauthorized' || data.error === 'Unknown device'))) {
                    showPairingLostModal();
                    return;
                }

                statusEl.innerText = data.ok ? `Status: ${data.status}` : `Error: ${data.error}`;

            } catch(e) {
                statusEl.innerText = 'Command failed';
            }
        }

        checkPairingStatus();

        async function verifyPairing() {
            const pairing = getStoredPairing();
            if (!pairing) return;

            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 3000);

                const resp = await fetch('/cmd', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        device_id: pairing.id,
                        token: pairing.token,
                        command: 0
                    }),
                    signal: controller.signal
                });

                clearTimeout(timeoutId);

                if (resp.status === 401 || resp.status === 403) {
                    localStorage.removeItem('device_id');
                    localStorage.removeItem('device_token');
                    window.location.href = '/settings.html';
                }
            } catch(e) {
                // Network error or timeout, ignore
            }
        }

        setTimeout(verifyPairing, 500);
    </script>
</body>
</html>
