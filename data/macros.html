<!DOCTYPE html>
<html lang="en">
<head>
    <title>Macro Config</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <button class="back-btn" onclick="window.location.href='/'">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                </svg>
            </button>
            <h1>Macros</h1>
            <button class="icon-btn" onclick="window.location.href='/settings.html'" title="Settings">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                </svg>
            </button>
        </div>

        <!-- Settings Card -->
        <div class="card">
            <div class="toggle-row">
                <input type="checkbox" id="msToggle" onchange="toggleTimeUnit(this.checked)">
                <label for="msToggle">Show timing in milliseconds</label>
            </div>
            <div class="tag-row">
                <label for="tagMacro">Tag fires:</label>
                <select id="tagMacro" onchange="quickSaveTagMacro()"></select>
                <button class="mini-save-btn" onclick="saveMacros()" title="Save">Save</button>
            </div>
        </div>

        <!-- Macro List -->
        <div id="macroList"></div>

        <!-- Add Macro Button -->
        <button class="btn btn-green" onclick="addMacro()" style="margin-bottom: 1rem;">+ Add Macro</button>

        <!-- Save Button -->
        <button id="saveBtn" class="btn btn-primary" onclick="saveMacros()">Save Changes</button>

        <p id="status" class="status-text"></p>
    </div>

    <!-- Save Success Modal -->
    <div id="saveModal" class="modal-overlay">
        <div class="modal">
            <div class="modal-icon">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="var(--accent-green)">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
            </div>
            <h3>Settings Saved</h3>
            <p>Your macro configuration has been saved successfully.</p>
            <div class="modal-btns">
                <button class="btn btn-green" onclick="closeSaveModal()">OK</button>
            </div>
        </div>
    </div>

    <!-- Error Modal -->
    <div id="errorModal" class="modal-overlay">
        <div class="modal">
            <div class="modal-icon">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="var(--accent-red)">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z" />
                </svg>
            </div>
            <h3 id="errorTitle">Error</h3>
            <p id="errorMsg">Something went wrong.</p>
            <div class="modal-btns">
                <button class="btn btn-red" onclick="closeErrorModal()">OK</button>
            </div>
        </div>
    </div>

    <!-- Pairing lost modal -->
    <div id="modal-overlay" class="modal-overlay">
        <div class="modal">
            <div class="modal-icon">&#128279;</div>
            <h3>Device No Longer Paired</h3>
            <p>This device is no longer recognised by the controller.</p>
            <p id="pairStatus" class="status-text center" style="display:none;"></p>
            <div class="modal-btns" id="modalBtns">
                <button class="btn btn-gray" onclick="closeModal()">Later</button>
                <button class="btn btn-green" id="pairNowBtn" onclick="pairNow()">Pair Now</button>
            </div>
        </div>
    </div>

    <script>
        let macros = [];
        let useMs = false;
        let modalShowing = false;

        function toggleDarkMode() {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('darkMode', document.documentElement.classList.contains('dark'));
        }
        if (localStorage.getItem('darkMode') === 'true' || 
            (!localStorage.getItem('darkMode') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }

        function getStoredPairing() {
            const id    = localStorage.getItem('device_id');
            const token = localStorage.getItem('device_token');
            return (id && token) ? { id, token } : null;
        }

        function storePairing(deviceId, token) {
            localStorage.setItem('device_id', deviceId);
            localStorage.setItem('device_token', token);
        }

        function generateUUID() {
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
                const r = Math.random() * 16 | 0;
                return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
            });
        }

        function showPairingLostModal() {
            if (modalShowing) return;
            modalShowing = true;
            document.getElementById('pairStatus').style.display = 'none';
            document.getElementById('modalBtns').style.display = 'flex';
            document.getElementById('modal-overlay').classList.add('active');
        }

        function closeModal() {
            modalShowing = false;
            document.getElementById('modal-overlay').classList.remove('active');
        }

        async function pairNow() {
            document.getElementById('pairStatus').style.display = 'block';
            document.getElementById('pairStatus').innerText = 'Pairing...';
            document.getElementById('modalBtns').style.display = 'none';

            const deviceId = generateUUID();

            try {
                const resp = await fetch('/pair', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ device_id: deviceId })
                });

                const data = await resp.json();

                if (data.ok && data.token) {
                    storePairing(deviceId, data.token);
                    document.getElementById('pairStatus').innerText = 'Paired!';
                    setTimeout(closeModal, 1000);
                } else {
                    document.getElementById('pairStatus').innerText = `Failed: ${data.error || 'Unknown error'}`;
                    document.getElementById('modalBtns').style.display = 'flex';
                }
            } catch (e) {
                document.getElementById('pairStatus').innerText = 'Failed - is pairing window open?';
                document.getElementById('modalBtns').style.display = 'flex';
            }
        }

        function toggleTimeUnit(checked) {
            useMs = checked;
            localStorage.setItem('useMs', checked ? '1' : '0');
            render();
        }

        function toDisplay(ms) {
            return useMs ? ms : parseFloat((ms / 1000).toFixed(1));
        }

        function fromDisplay(val) {
            return useMs ? parseInt(val) : Math.round(parseFloat(val) * 1000);
        }

        function timeStep() { return useMs ? 1 : 0.1; }
        function timeMax()  { return useMs ? 65535 : 65; }
        function timeUnit() { return useMs ? 'ms' : 's'; }

        async function loadMacros() {
            useMs = localStorage.getItem('useMs') === '1';
            document.getElementById('msToggle').checked = useMs;

            try {
                const resp = await fetch('/api/macros');
                const data = await resp.json();
                macros = data.macros || [];
                document.getElementById('tagMacro').dataset.value = data.tag_macro || 0;
                render();
            } catch(e) {
                document.getElementById('status').innerText = 'Failed to load macros';
            }
        }

        function render() {
            const list = document.getElementById('macroList');
            list.innerHTML = '';

            const sel = document.getElementById('tagMacro');
            const prev = parseInt(sel.dataset.value) || 0;
            sel.innerHTML = '';
            macros.forEach((m, i) => {
                const opt = document.createElement('option');
                opt.value = i;
                opt.text = m.name || `Macro ${i + 1}`;
                sel.appendChild(opt);
            });
            sel.value = prev < macros.length ? prev : 0;

            macros.forEach((macro, mi) => {
                const card = document.createElement('div');
                card.className = 'macro-card';
                card.innerHTML = `
                    <div class="macro-header">
                        <input type="text" value="${macro.name}" placeholder="Macro name"
                            oninput="macros[${mi}].name = this.value; updateTagSelect(${mi}, this.value)">
                        <button class="remove-btn" onclick="removeMacro(${mi})">
                            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                            </svg>
                        </button>
                    </div>
                    <div class="steps-container" id="steps-${mi}"></div>
                    ${macro.steps.length < 4 ? `
                        <button class="add-step-btn" onclick="addStep(${mi})">+ Add Step</button>
                    ` : ''}
                `;
                list.appendChild(card);

                const stepsDiv = card.querySelector(`#steps-${mi}`);
                macro.steps.forEach((step, si) => {
                    stepsDiv.appendChild(renderStep(mi, si, step));
                });
            });
        }

        function renderStep(mi, si, step) {
            const div = document.createElement('div');
            div.className = 'step-card';

            let relayHTML = '<div class="relay-checks">';
            for (let r = 0; r < 4; r++) {
                const checked = (step.relay_mask & (1 << r)) ? 'checked' : '';
                relayHTML += `
                    <label>
                        <input type="checkbox" ${checked} onchange="setRelay(${mi}, ${si}, ${r}, this.checked)">
                        Relay ${r + 1}
                    </label>`;
            }
            relayHTML += '</div>';

            const isLastStep = si === macros[mi].steps.length - 1;

            const gapHTML = isLastStep ? '' : `
                <div>
                    <label>Delay before next (${timeUnit()})</label>
                    <input type="number" min="0" max="${timeMax()}" step="${timeStep()}"
                        value="${toDisplay(step.gap)}"
                        onchange="macros[${mi}].steps[${si}].gap = fromDisplay(this.value)">
                </div>
            `;

            div.innerHTML = `
                <div class="step-header">
                    <span>Step ${si + 1}</span>
                    ${macros[mi].steps.length > 1 ? `
                        <button class="step-remove" onclick="removeStep(${mi}, ${si})">
                            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                            </svg>
                        </button>
                    ` : ''}
                </div>
                ${relayHTML}
                <div class="timing-row">
                    <div>
                        <label>Duration (${timeUnit()})</label>
                        <input type="number" min="0" max="${timeMax()}" step="${timeStep()}"
                            value="${toDisplay(step.duration)}"
                            onchange="macros[${mi}].steps[${si}].duration = fromDisplay(this.value)">
                    </div>
                    ${gapHTML}
                </div>
            `;
            return div;
        }

        function setRelay(mi, si, relay, on) {
            if (on) {
                macros[mi].steps[si].relay_mask |= (1 << relay);
            } else {
                macros[mi].steps[si].relay_mask &= ~(1 << relay);
            }
        }

        function addMacro() {
            if (macros.length >= 6) {
                document.getElementById('status').innerText = 'Maximum 6 macros reached';
                return;
            }
            macros.push({ name: '', icon: '', step_count: 1, steps: [{ relay_mask: 0, duration: 1000, gap: 0 }] });
            render();
        }

        function removeMacro(mi) {
            macros.splice(mi, 1);
            const sel = document.getElementById('tagMacro');
            let tag = parseInt(sel.value);
            if (tag >= macros.length) tag = Math.max(0, macros.length - 1);
            sel.dataset.value = tag;
            render();
        }

        function addStep(mi) {
            if (macros[mi].steps.length >= 4) return;
            macros[mi].steps.push({ relay_mask: 0, duration: 1000, gap: 0 });
            macros[mi].step_count = macros[mi].steps.length;
            render();
        }

        function removeStep(mi, si) {
            macros[mi].steps.splice(si, 1);
            macros[mi].step_count = macros[mi].steps.length;
            render();
        }

        function updateTagSelect(mi, name) {
            const sel = document.getElementById('tagMacro');
            if (sel.options[mi]) sel.options[mi].text = name || `Macro ${mi + 1}`;
        }

        async function quickSaveTagMacro() {
            const pairing = getStoredPairing();
            if (!pairing) {
                showPairingLostModal();
                return;
            }
            const btn = document.querySelector('.mini-save-btn');
            btn.classList.add('btn-pressed');

            const payload = {
                macro_count: macros.length,
                tag_macro: parseInt(document.getElementById('tagMacro').value),
                macros: macros
            };

            try {
                const resp = await fetch('/api/macros', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await resp.json();
                if (data.ok) {
                    document.getElementById('saveModal').classList.add('active');
                } else {
                    showError(data.error || 'Failed to save');
                }
            } catch(e) {
                showError('Network error - save failed');
            }

            setTimeout(() => btn.classList.remove('btn-pressed'), 150);
        }

        async function saveMacros() {
            const pairing = getStoredPairing();
            if (!pairing) {
                showPairingLostModal();
                return;
            }

            const btn = document.getElementById('saveBtn');
            btn.classList.add('btn-pressed');
            btn.disabled = true;

            macros.forEach(m => m.step_count = m.steps.length);

            const payload = {
                macro_count: macros.length,
                tag_macro: parseInt(document.getElementById('tagMacro').value),
                macros: macros
            };

            try {
                const resp = await fetch('/api/macros', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await resp.json();
                if (data.ok) {
                    document.getElementById('saveModal').classList.add('active');
                } else {
                    showError(data.error || 'Failed to save');
                }
            } catch(e) {
                showError('Network error - save failed');
            }

            btn.disabled = false;
            setTimeout(() => btn.classList.remove('btn-pressed'), 150);
        }

        function closeSaveModal() {
            document.getElementById('saveModal').classList.remove('active');
        }

        function showError(msg) {
            document.getElementById('errorMsg').textContent = msg;
            document.getElementById('errorModal').classList.add('active');
        }

        function closeErrorModal() {
            document.getElementById('errorModal').classList.remove('active');
        }

        loadMacros();
    </script>
</body>
</html>
