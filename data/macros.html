<!DOCTYPE html>
<html lang="en">
<head>
    <title>Macro Config</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        :root {
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --accent-green: #22c55e;
            --accent-red: #ef4444;
            --accent-purple: #a855f7;
            --bg: #f3f4f6;
            --card-bg: #ffffff;
            --text: #1f2937;
            --text-secondary: #6b7280;
            --border: #e5e7eb;
            --step-bg: #f9fafb;
        }
        html.dark {
            --bg: #111827;
            --card-bg: #1f2937;
            --text: #f9fafb;
            --text-secondary: #9ca3af;
            --border: #374151;
            --step-bg: #374151;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 1rem;
            transition: background 0.2s, color 0.2s;
        }
        .container { max-width: 500px; margin: 0 auto; }
        @media (min-width: 640px) {
            .container { max-width: 600px; }
        }
        @media (min-width: 1024px) {
            .container { max-width: 700px; }
            .card, .macro-card { padding: 1.5rem; }
            h1 { font-size: 2rem; }
        }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        .back-btn, .icon-btn {
            width: 44px;
            height: 44px;
            padding: 0;
            border-radius: 0.75rem;
            background: var(--border);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        .back-btn:hover, .icon-btn:hover { background: #d1d5db; }
        html.dark .back-btn:hover, html.dark .icon-btn:hover { background: #4b5563; }
        .back-btn svg, .icon-btn svg { width: 20px; height: 20px; color: var(--text); }
        h1 { font-size: 1.5rem; color: var(--primary); }
        
        .card {
            background: var(--card-bg);
            border-radius: 1rem;
            padding: 1rem;
            margin-bottom: 1rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: background 0.2s;
        }
        .toggle-row { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1rem; }
        .toggle-row input { width: 20px; height: 20px; }
        .toggle-row label { font-size: 0.875rem; color: var(--text-secondary); cursor: pointer; }
        .tag-row { display: flex; align-items: center; gap: 0.75rem; margin-top: 0.75rem; padding-top: 0.75rem; border-top: 1px solid var(--border); }
        .tag-row label { font-size: 0.875rem; color: var(--text-secondary); }
        .tag-row select { flex: 1; padding: 0.5rem; border-radius: 0.5rem; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 0.875rem; }
        
        .macro-card {
            background: var(--card-bg);
            border-radius: 1rem;
            padding: 1rem;
            margin-bottom: 1rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: background 0.2s;
        }
        .macro-header { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1rem; }
        .macro-header input { flex: 1; padding: 0.625rem; border-radius: 0.5rem; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 0.875rem; }
        .remove-btn {
            width: 36px;
            height: 36px;
            border-radius: 0.5rem;
            background: rgba(239,68,68,0.1);
            border: none;
            cursor: pointer;
            color: var(--accent-red);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        .remove-btn:hover { background: rgba(239,68,68,0.2); }
        .remove-btn svg { width: 18px; height: 18px; }
        
        .step-card {
            background: var(--step-bg);
            border-radius: 0.75rem;
            padding: 0.75rem;
            margin-bottom: 0.75rem;
        }
        .step-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; }
        .step-header span { font-size: 0.75rem; font-weight: 600; color: var(--text-secondary); }
        .step-remove { background: none; border: none; cursor: pointer; color: var(--text-secondary); padding: 0.25rem; }
        .step-remove:hover { color: var(--accent-red); }
        .step-remove svg { width: 16px; height: 16px; }
        
        .relay-checks { display: flex; flex-wrap: wrap; gap: 0.75rem; margin-bottom: 0.75rem; }
        .relay-checks label { display: flex; align-items: center; gap: 0.375rem; cursor: pointer; font-size: 0.875rem; }
        .relay-checks input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; }
        
        .timing-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
        .timing-row label { font-size: 0.75rem; color: var(--text-secondary); margin-bottom: 0.25rem; display: block; }
        .timing-row input { width: 100%; padding: 0.5rem; border-radius: 0.5rem; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 0.875rem; }
        
        .add-step-btn {
            width: 100%;
            padding: 0.5rem;
            border: 2px dashed var(--border);
            border-radius: 0.5rem;
            background: none;
            color: var(--text-secondary);
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            transition: border-color 0.2s, color 0.2s;
        }
        .add-step-btn:hover { border-color: var(--primary); color: var(--primary); }
        
        .btn {
            display: block;
            width: 100%;
            padding: 0.875rem 1rem;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 0.75rem;
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
        }
        .btn:active { transform: scale(0.97); }
        .btn-green { background: var(--accent-green); color: white; }
        .btn-green:hover { background: #16a34a; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-hover); }
        
        .status-text { font-size: 0.875rem; color: var(--text-secondary); text-align: center; margin-top: 1rem; height: 1.5rem; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <button class="back-btn" onclick="window.location.href='/'">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                </svg>
            </button>
            <h1>Macros</h1>
            <button class="icon-btn" onclick="window.location.href='/settings.html'" title="Settings">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                </svg>
            </button>
        </div>

        <!-- Settings Card -->
        <div class="card">
            <div class="toggle-row">
                <input type="checkbox" id="msToggle" onchange="toggleTimeUnit(this.checked)">
                <label for="msToggle">Show timing in milliseconds</label>
            </div>
            <div class="tag-row">
                <label for="tagMacro">Tag scan fires:</label>
                <select id="tagMacro"></select>
            </div>
        </div>

        <!-- Macro List -->
        <div id="macroList"></div>

        <!-- Add Macro Button -->
        <button class="btn btn-green" onclick="addMacro()" style="margin-bottom: 1rem;">+ Add Macro</button>

        <!-- Save Button -->
        <button class="btn btn-primary" onclick="saveMacros()">Save Changes</button>

        <p id="status" class="status-text"></p>
    </div>

    <script>
        let macros = [];
        let useMs = false;

        function toggleDarkMode() {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('darkMode', document.documentElement.classList.contains('dark'));
        }
        if (localStorage.getItem('darkMode') === 'true' || 
            (!localStorage.getItem('darkMode') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }

        function toggleTimeUnit(checked) {
            useMs = checked;
            localStorage.setItem('useMs', checked ? '1' : '0');
            render();
        }

        function toDisplay(ms) {
            return useMs ? ms : parseFloat((ms / 1000).toFixed(1));
        }

        function fromDisplay(val) {
            return useMs ? parseInt(val) : Math.round(parseFloat(val) * 1000);
        }

        function timeStep() { return useMs ? 1 : 0.1; }
        function timeMax()  { return useMs ? 65535 : 65; }
        function timeUnit() { return useMs ? 'ms' : 's'; }

        async function loadMacros() {
            useMs = localStorage.getItem('useMs') === '1';
            document.getElementById('msToggle').checked = useMs;

            try {
                const resp = await fetch('/api/macros');
                const data = await resp.json();
                macros = data.macros || [];
                document.getElementById('tagMacro').dataset.value = data.tag_macro || 0;
                render();
            } catch(e) {
                document.getElementById('status').innerText = 'Failed to load macros';
            }
        }

        function render() {
            const list = document.getElementById('macroList');
            list.innerHTML = '';

            const sel = document.getElementById('tagMacro');
            const prev = parseInt(sel.dataset.value) || 0;
            sel.innerHTML = '';
            macros.forEach((m, i) => {
                const opt = document.createElement('option');
                opt.value = i;
                opt.text = m.name || `Macro ${i + 1}`;
                sel.appendChild(opt);
            });
            sel.value = prev < macros.length ? prev : 0;

            macros.forEach((macro, mi) => {
                const card = document.createElement('div');
                card.className = 'macro-card';
                card.innerHTML = `
                    <div class="macro-header">
                        <input type="text" value="${macro.name}" placeholder="Macro name"
                            oninput="macros[${mi}].name = this.value; updateTagSelect(${mi}, this.value)">
                        <button class="remove-btn" onclick="removeMacro(${mi})">
                            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                            </svg>
                        </button>
                    </div>
                    <div class="steps-container" id="steps-${mi}"></div>
                    ${macro.steps.length < 4 ? `
                        <button class="add-step-btn" onclick="addStep(${mi})">+ Add Step</button>
                    ` : ''}
                `;
                list.appendChild(card);

                const stepsDiv = card.querySelector(`#steps-${mi}`);
                macro.steps.forEach((step, si) => {
                    stepsDiv.appendChild(renderStep(mi, si, step));
                });
            });
        }

        function renderStep(mi, si, step) {
            const div = document.createElement('div');
            div.className = 'step-card';

            let relayHTML = '<div class="relay-checks">';
            for (let r = 0; r < 4; r++) {
                const checked = (step.relay_mask & (1 << r)) ? 'checked' : '';
                relayHTML += `
                    <label>
                        <input type="checkbox" ${checked} onchange="setRelay(${mi}, ${si}, ${r}, this.checked)">
                        Relay ${r + 1}
                    </label>`;
            }
            relayHTML += '</div>';

            const isLastStep = si === macros[mi].steps.length - 1;

            const gapHTML = isLastStep ? '' : `
                <div>
                    <label>Delay before next (${timeUnit()})</label>
                    <input type="number" min="0" max="${timeMax()}" step="${timeStep()}"
                        value="${toDisplay(step.gap)}"
                        onchange="macros[${mi}].steps[${si}].gap = fromDisplay(this.value)">
                </div>
            `;

            div.innerHTML = `
                <div class="step-header">
                    <span>Step ${si + 1}</span>
                    ${macros[mi].steps.length > 1 ? `
                        <button class="step-remove" onclick="removeStep(${mi}, ${si})">
                            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                            </svg>
                        </button>
                    ` : ''}
                </div>
                ${relayHTML}
                <div class="timing-row">
                    <div>
                        <label>Duration (${timeUnit()})</label>
                        <input type="number" min="0" max="${timeMax()}" step="${timeStep()}"
                            value="${toDisplay(step.duration)}"
                            onchange="macros[${mi}].steps[${si}].duration = fromDisplay(this.value)">
                    </div>
                    ${gapHTML}
                </div>
            `;
            return div;
        }

        function setRelay(mi, si, relay, on) {
            if (on) {
                macros[mi].steps[si].relay_mask |= (1 << relay);
            } else {
                macros[mi].steps[si].relay_mask &= ~(1 << relay);
            }
        }

        function addMacro() {
            if (macros.length >= 6) {
                document.getElementById('status').innerText = 'Maximum 6 macros reached';
                return;
            }
            macros.push({ name: '', icon: '', step_count: 1, steps: [{ relay_mask: 0, duration: 1000, gap: 0 }] });
            render();
        }

        function removeMacro(mi) {
            macros.splice(mi, 1);
            const sel = document.getElementById('tagMacro');
            let tag = parseInt(sel.value);
            if (tag >= macros.length) tag = Math.max(0, macros.length - 1);
            sel.dataset.value = tag;
            render();
        }

        function addStep(mi) {
            if (macros[mi].steps.length >= 4) return;
            macros[mi].steps.push({ relay_mask: 0, duration: 1000, gap: 0 });
            macros[mi].step_count = macros[mi].steps.length;
            render();
        }

        function removeStep(mi, si) {
            macros[mi].steps.splice(si, 1);
            macros[mi].step_count = macros[mi].steps.length;
            render();
        }

        function updateTagSelect(mi, name) {
            const sel = document.getElementById('tagMacro');
            if (sel.options[mi]) sel.options[mi].text = name || `Macro ${mi + 1}`;
        }

        async function saveMacros() {
            const btn = document.querySelector('.btn-primary');
            btn.disabled = true;

            macros.forEach(m => m.step_count = m.steps.length);

            const payload = {
                macro_count: macros.length,
                tag_macro: parseInt(document.getElementById('tagMacro').value),
                macros: macros
            };

            try {
                const resp = await fetch('/api/macros', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await resp.json();
                document.getElementById('status').innerText = data.ok ? 'Saved!' : `Error: ${data.error}`;
            } catch(e) {
                document.getElementById('status').innerText = 'Save failed';
            }

            btn.disabled = false;
        }

        loadMacros();
    </script>
</body>
</html>
