<!DOCTYPE html>
<html lang="en">
<head>
    <title>Settings</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        :root {
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --accent-green: #22c55e;
            --accent-red: #ef4444;
            --accent-purple: #a855f7;
            --bg: #f3f4f6;
            --card-bg: #ffffff;
            --text: #1f2937;
            --text-secondary: #6b7280;
            --border: #e5e7eb;
        }
        html.dark {
            --bg: #111827;
            --card-bg: #1f2937;
            --text: #f9fafb;
            --text-secondary: #9ca3af;
            --border: #374151;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 1rem;
            transition: background 0.2s, color 0.2s;
        }
        .container { max-width: 400px; margin: 0 auto; }
        @media (min-width: 640px) { .container { max-width: 500px; } }
        @media (min-width: 1024px) { .container { max-width: 600px; } }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        .back-btn, .icon-btn {
            width: 44px;
            height: 44px;
            padding: 0;
            border-radius: 0.75rem;
            background: var(--border);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        .back-btn:hover, .icon-btn:hover { background: #d1d5db; }
        html.dark .back-btn:hover, html.dark .icon-btn:hover { background: #4b5563; }
        .back-btn svg, .icon-btn svg { width: 20px; height: 20px; color: var(--text); }
        h1 { font-size: 1.5rem; color: var(--primary); }
        
        .card {
            background: var(--card-bg);
            border-radius: 1rem;
            padding: 1.5rem;
            margin-bottom: 1rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: background 0.2s;
        }
        h2 { font-size: 1rem; color: var(--text); margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; }
        .status-text { font-size: 0.875rem; color: var(--text-secondary); margin-bottom: 1rem; }
        
        .btn {
            display: block;
            width: 100%;
            padding: 0.875rem 1rem;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 0.75rem;
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
        }
        .btn:active { transform: scale(0.97); }
        .btn-green { background: var(--accent-green); color: white; }
        .btn-green:hover { background: #16a34a; }
        .btn-red { background: var(--accent-red); color: white; }
        .btn-red:hover { background: #dc2626; }
        
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 1rem;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: var(--card-bg);
            border-radius: 1.5rem;
            padding: 1.5rem;
            max-width: 320px;
            width: 100%;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .modal-icon { font-size: 3rem; margin-bottom: 1rem; }
        .modal h3 { font-size: 1.25rem; margin-bottom: 0.5rem; }
        .modal p { font-size: 0.875rem; color: var(--text-secondary); margin-bottom: 1.5rem; }
        .modal-btns { display: flex; gap: 0.75rem; }
        .modal-btns .btn { width: auto; flex: 1; padding: 0.75rem; font-size: 0.875rem; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <button class="back-btn" onclick="window.location.href='/'">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                </svg>
            </button>
            <h1>Settings</h1>
            <button class="icon-btn" onclick="toggleDarkMode()">
                <svg id="sunIcon" class="hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
                </svg>
                <svg id="moonIcon" class="block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
                </svg>
            </button>
        </div>

        <div class="card">
            <h2>
                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"/>
                </svg>
                Phone Pairing
            </h2>
            <p id="pairStatus" class="status-text">Checking pairing status...</p>
            <button id="pairBtn" class="btn btn-green" onclick="pairDevice()">Pair This Device</button>
            <button id="unpairBtn" class="btn btn-red" onclick="unpairDevice()" style="display:none">Unpair This Device</button>
        </div>

        <div class="card">
            <h2>
                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
                About
            </h2>
            <p class="status-text">Access Controller v1.0</p>
        </div>
    </div>

    <div id="modal-overlay" class="modal-overlay">
        <div class="modal">
            <div class="modal-icon">&#128279;</div>
            <h3>Device No Longer Paired</h3>
            <p>This device is no longer recognised by the controller. This usually happens after a reset or re-flash.</p>
            <div class="modal-btns">
                <button class="btn btn-gray" onclick="closeModal()">Later</button>
                <button class="btn btn-green" onclick="closeModalAndPair()">Pair Now</button>
            </div>
        </div>
    </div>

    <script>
        let modalShowing = false;

        function toggleDarkMode() {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('darkMode', document.documentElement.classList.contains('dark'));
        }
        if (localStorage.getItem('darkMode') === 'true' || 
            (!localStorage.getItem('darkMode') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }

        function generateUUID() {
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
                const r = Math.random() * 16 | 0;
                return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
            });
        }

        function getStoredPairing() {
            const id    = localStorage.getItem('device_id');
            const token = localStorage.getItem('device_token');
            return (id && token) ? { id, token } : null;
        }

        function storePairing(deviceId, token) {
            localStorage.setItem('device_id', deviceId);
            localStorage.setItem('device_token', token);
        }

        function clearPairing() {
            localStorage.removeItem('device_id');
            localStorage.removeItem('device_token');
        }

        function setPairStatus(msg, paired) {
            document.getElementById('pairStatus').innerText = msg;
            document.getElementById('pairBtn').style.display   = paired ? 'none' : 'block';
            document.getElementById('unpairBtn').style.display = paired ? 'block' : 'none';
        }

        function checkPairingStatus() {
            const pairing = getStoredPairing();
            if (pairing) {
                setPairStatus(`Paired - ID: ${pairing.id.substring(0, 8)}...`, true);
            } else {
                setPairStatus('Not paired. Hold button on device (3s), then click Pair.', false);
            }
        }

        function showPairingLostModal() {
            if (modalShowing) return;
            modalShowing = true;
            clearPairing();
            setPairStatus('Pairing lost - please re-pair.', false);
            document.getElementById('modal-overlay').classList.add('active');
        }

        function closeModal() {
            modalShowing = false;
            document.getElementById('modal-overlay').classList.remove('active');
        }

        function closeModalAndPair() {
            closeModal();
            pairDevice();
        }

        async function pairDevice() {
            const btn = document.getElementById('pairBtn');
            btn.disabled = true;
            setPairStatus('Pairing...', false);

            const deviceId = generateUUID();

            try {
                const resp = await fetch('/pair', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ device_id: deviceId })
                });

                const data = await resp.json();

                if (data.ok && data.token) {
                    storePairing(deviceId, data.token);
                    setPairStatus(`Paired - ID: ${deviceId.substring(0, 8)}...`, true);
                } else {
                    setPairStatus(`Pairing failed: ${data.error || 'Unknown error'}`, false);
                }
            } catch (e) {
                setPairStatus('Pairing failed - is the pairing window open?', false);
            }

            btn.disabled = false;
        }

        async function unpairDevice() {
            const pairing = getStoredPairing();
            if (!pairing) { checkPairingStatus(); return; }

            try {
                const resp = await fetch('/unpair', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        device_id: pairing.id,
                        token: pairing.token
                    })
                });

                const data = await resp.json();
                if (data.ok) {
                    clearPairing();
                    setPairStatus('Unpaired successfully.', false);
                } else {
                    setPairStatus(`Unpair failed: ${data.error || 'Unknown error'}`, false);
                }
            } catch(e) {
                setPairStatus('Unpair request failed.', false);
            }
        }

        checkPairingStatus();
    </script>
</body>
</html>
