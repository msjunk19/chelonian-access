<!DOCTYPE html>
<html lang="en">
<head>
    <title>Settings</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <button class="back-btn" onclick="window.location.href='/'">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                </svg>
            </button>
            <h1>Settings</h1>
            <button class="icon-btn" onclick="toggleDarkMode()">
                <svg id="sunIcon" class="hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
                </svg>
                <svg id="moonIcon" class="block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
                </svg>
            </button>
        </div>

        <div class="card">
            <h2>
                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"/>
                </svg>
                Phone Pairing
            </h2>
            <p id="pairStatus" class="status-text">Checking pairing status...</p>
            <button id="pairBtn" class="btn btn-green" onclick="pairDevice()">Pair This Device</button>
            <button id="unpairBtn" class="btn btn-red" onclick="unpairDevice()" style="display:none">Unpair This Device</button>
        </div>

        <div class="card">
            <h2>
                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
                About
            </h2>
            <p class="status-text">Access Controller v1.0</p>
        </div>
    </div>

    <div id="modal-overlay" class="modal-overlay">
        <div class="modal">
            <div class="modal-icon">&#128279;</div>
            <h3>Device No Longer Paired</h3>
            <p>This device is no longer recognised by the controller. This usually happens after a reset or re-flash.</p>
            <div class="modal-btns">
                <button class="btn btn-gray" onclick="closeModal()">Later</button>
                <button class="btn btn-green" onclick="closeModalAndPair()">Pair Now</button>
            </div>
        </div>
    </div>

    <script>
        let modalShowing = false;

        function toggleDarkMode() {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('darkMode', document.documentElement.classList.contains('dark'));
        }
        if (localStorage.getItem('darkMode') === 'true' || 
            (!localStorage.getItem('darkMode') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }

        function generateUUID() {
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
                const r = Math.random() * 16 | 0;
                return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
            });
        }

        function getStoredPairing() {
            const id    = localStorage.getItem('device_id');
            const token = localStorage.getItem('device_token');
            return (id && token) ? { id, token } : null;
        }

        function storePairing(deviceId, token) {
            localStorage.setItem('device_id', deviceId);
            localStorage.setItem('device_token', token);
        }

        function clearPairing() {
            localStorage.removeItem('device_id');
            localStorage.removeItem('device_token');
        }

        function setPairStatus(msg, paired) {
            document.getElementById('pairStatus').innerText = msg;
            document.getElementById('pairBtn').style.display   = paired ? 'none' : 'block';
            document.getElementById('unpairBtn').style.display = paired ? 'block' : 'none';
        }

        function checkPairingStatus() {
            const pairing = getStoredPairing();
            if (pairing) {
                setPairStatus(`Paired - ID: ${pairing.id.substring(0, 8)}...`, true);
            } else {
                setPairStatus('Not paired. Hold button on device (3s), then click Pair.', false);
            }
        }

        function showPairingLostModal() {
            if (modalShowing) return;
            modalShowing = true;
            clearPairing();
            setPairStatus('Pairing lost - please re-pair.', false);
            document.getElementById('modal-overlay').classList.add('active');
        }

        function closeModal() {
            modalShowing = false;
            document.getElementById('modal-overlay').classList.remove('active');
        }

        function closeModalAndPair() {
            closeModal();
            pairDevice();
        }

        async function pairDevice() {
            const btn = document.getElementById('pairBtn');
            btn.disabled = true;
            setPairStatus('Pairing...', false);

            const deviceId = generateUUID();

            try {
                const resp = await fetch('/pair', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ device_id: deviceId })
                });

                const data = await resp.json();

                if (data.ok && data.token) {
                    storePairing(deviceId, data.token);
                    setPairStatus(`Paired - ID: ${deviceId.substring(0, 8)}...`, true);
                } else {
                    setPairStatus(`Pairing failed: ${data.error || 'Unknown error'}`, false);
                }
            } catch (e) {
                setPairStatus('Pairing failed - is the pairing window open?', false);
            }

            btn.disabled = false;
        }

        async function unpairDevice() {
            const pairing = getStoredPairing();
            if (!pairing) { checkPairingStatus(); return; }

            try {
                const resp = await fetch('/unpair', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        device_id: pairing.id,
                        token: pairing.token
                    })
                });

                const data = await resp.json();
                if (data.ok) {
                    clearPairing();
                    setPairStatus('Unpaired successfully.', false);
                } else {
                    setPairStatus(`Unpair failed: ${data.error || 'Unknown error'}`, false);
                }
            } catch(e) {
                setPairStatus('Unpair request failed.', false);
            }
        }

        checkPairingStatus();
    </script>
</body>
</html>
