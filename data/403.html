<!DOCTYPE html>
<html lang="en">
<head>
    <title>403 Forbidden</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<script>
    if (localStorage.getItem('darkMode') === 'true' || 
        (!localStorage.getItem('darkMode') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
    }
</script>
    <div class="container center">
        <div class="icon-wrap" style="margin-bottom: 1rem;">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z" />
            </svg>
        </div>
        <h1 style="margin-bottom: 1rem;">403 Forbidden</h1>
        <p class="status-text center">Access denied. You don't have permission to view this page.</p>
        <a href="/" class="btn btn-blue" style="margin-top: 1.5rem;">Return Home</a>
    </div>
</body>
</html>
