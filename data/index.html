<!DOCTYPE html>
<html lang="en">
<head>
    <title>Device Setup</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        :root {
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --bg: #f3f4f6;
            --card-bg: #ffffff;
            --text: #1f2937;
            --text-secondary: #6b7280;
            --border: #e5e7eb;
        }
        html.dark {
            --bg: #111827;
            --card-bg: #1f2937;
            --text: #f9fafb;
            --text-secondary: #9ca3af;
            --border: #374151;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            transition: background 0.2s, color 0.2s;
        }
        .container { width: 100%; max-width: 400px; }
        @media (min-width: 640px) {
            .container { max-width: 450px; }
        }
        @media (min-width: 1024px) {
            .container { max-width: 500px; }
        }
        .card {
            background: var(--card-bg);
            border-radius: 1.5rem;
            padding: 2rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            transition: background 0.2s;
        }
        .icon-wrap {
            width: 4rem;
            height: 4rem;
            background: rgba(59, 130, 246, 0.1);
            border-radius: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
        }
        html.dark .icon-wrap { background: rgba(59, 130, 246, 0.2); }
        .icon-wrap svg { width: 2rem; height: 2rem; color: var(--primary); }
        h1 { font-size: 1.5rem; text-align: center; color: var(--text); margin-bottom: 0.5rem; }
        @media (min-width: 1024px) { h1 { font-size: 1.75rem; } }
        .subtitle { font-size: 0.875rem; color: var(--text-secondary); text-align: center; margin-bottom: 1.5rem; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; font-size: 0.875rem; font-weight: 500; color: var(--text); margin-bottom: 0.5rem; }
        input {
            width: 100%;
            padding: 0.75rem 1rem;
            font-size: 1rem;
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            background: var(--bg);
            color: var(--text);
            transition: border-color 0.2s;
        }
        input:focus { outline: none; border-color: var(--primary); }
        .btn {
            display: block;
            width: 100%;
            padding: 0.875rem 1.5rem;
            font-size: 1rem;
            font-weight: 600;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 0.75rem;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }
        .btn:hover { background: var(--primary-hover); }
        .btn:active { transform: scale(0.98); }
        .footer { text-align: center; font-size: 0.75rem; color: var(--text-secondary); margin-top: 1.5rem; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="icon-wrap">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.111 16.404a5.5 5.5 0 017.778 0M12 20h.01m-7.08-7.071c3.904-3.905 10.236-3.905 14.141 0M1.394 9.393c5.857-5.857 15.355-5.857 21.213 0"/>
                </svg>
            </div>
            <h1>Device WiFi Setup</h1>
            <p class="subtitle">Connect to your local network</p>
            
            <form method="POST" action="/save">
                <div class="form-group">
                    <label for="ssid">Network Name</label>
                    <input type="text" name="ssid" placeholder="SSID" required>
                </div>
                <div class="form-group">
                    <label for="pass">Password</label>
                    <input type="password" name="pass" placeholder="Password" minlength="8">
                </div>
                <button type="submit" class="btn">Save</button>
            </form>
            
            <p class="footer">Only this page is accessible on the default portal.</p>
        </div>
    </div>
</body>
</html>
